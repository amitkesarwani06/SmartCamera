services:

  # ── Backend (FastAPI + Uvicorn) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartcamera-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/cache:/app/cache
      - ./backend/cctv.db:/app/cctv.db
    depends_on:
      mediamtx:
        condition: service_healthy
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}

  # ── Frontend (Vite + React → Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartcamera-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── MediaMTX (RTSP Server) ─────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    restart: unless-stopped

    ports:
      - "${RTSP_PORT:-8554}:8554"   # RTSP
      - "${HLS_PORT:-8888}:8888"    # HLS
      - "${WEBRTC_PORT:-8889}:8889" # WebRTC
      - "${API_PORT:-9997}:9997"    # MediaMTX REST API

    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx/videos:/videos:ro

    environment:
      - MTX_LOGLEVEL=${MTX_LOGLEVEL:-info}

    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9997/v3/config/global/get" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
